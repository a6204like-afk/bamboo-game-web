<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 竹筍遊戲室</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: #f7f9f7; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 350px; margin: 0 auto; }
        #avatar { width: 60px; height: 60px; border-radius: 50%; margin-bottom: 10px; display: none; margin: 0 auto; }
        .user-list { text-align: left; background: #eee; border-radius: 10px; padding: 10px; margin-top: 20px; font-size: 14px; }
        .player-tag { display: inline-block; background: #06c755; color: white; padding: 2px 8px; border-radius: 10px; margin: 2px; }
    </style>
</head>
<body>

    <div class="card">
        <img id="avatar" src="">
        <div id="userName" style="font-weight: bold;">載入中...</div>
        <hr>
        <div id="status">正在連線至遊戲伺服器...</div>
        
        <div class="user-list">
            <strong>目前在線玩家：</strong>
            <div id="playerContainer">等待玩家加入...</div>
        </div>
    </div>

    <script>
        // 1. 你的 Firebase 設定
        const firebaseConfig = {
            apiKey: "AIzaSyBHWJPT6ZyvFrZE0-d6gJW-F7EfJCQfeNE",
            authDomain: "bamboo-game.firebaseapp.com",
            projectId: "bamboo-game",
            storageBucket: "bamboo-game.firebasestorage.app",
            messagingSenderId: "986027038887",
            appId: "1:986027038887:web:d69613c79921b12f1a6382",
            measurementId: "G-R7TYX0Q3XR"
        };

        // 初始化 Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function initGame() {
            try {
                // 初始化 LIFF (請確認 ID 正確)
                await liff.init({ liffId: "2009477552-iCxgtKls" }); 

                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    const uid = profile.userId;
                    const name = profile.displayName;

                    // 顯示個人資訊
                    document.getElementById('userName').innerText = name;
                    document.getElementById('avatar').src = profile.pictureUrl;
                    document.getElementById('avatar').style.display = "block";

                    // 2. 在 Firebase 簽到
                    const userRef = db.ref('online_players/' + uid);
                    userRef.set({
                        name: name,
                        lastSeen: Date.now()
                    });

                    // 離線時自動刪除簽到紀錄
                    userRef.onDisconnect().remove();

                    // 3. 監聽在線人數變化 (即時同步)
                    db.ref('online_players').on('value', (snapshot) => {
                        const players = snapshot.val();
                        const container = document.getElementById('playerContainer');
                        container.innerHTML = "";
                        
                        if (players) {
                            Object.values(players).forEach(p => {
                                const span = document.createElement('span');
                                span.className = 'player-tag';
                                span.innerText = p.name;
                                container.appendChild(span);
                            });
                            document.getElementById('status').innerText = "遊戲室連線中 🟢";
                        }
                    });
                }
            } catch (err) {
                document.getElementById('status').innerText = "錯誤: " + err;
            }
        }

        initGame();
    </script>
</body>
</html>
