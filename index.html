<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎋 拔竹筍：身分標示版</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: #f1f8e9; margin: 0; padding: 10px; }
        
        #farmMap {
            width: 100%; height: 420px; background-color: #dcedc8; border: 4px solid #8bc34a;
            border-radius: 20px; position: relative; overflow: hidden; margin: 5px auto;
            background-image: radial-gradient(#aed581 10%, transparent 11%); background-size: 30px 30px;
        }

        #bambooFieldBtn {
            width: 110px; height: 110px; background: #8d6e63; border: 4px solid #6d4c41;
            border-radius: 15px; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 5; cursor: pointer;
            box-shadow: 0 4px 0 #4e342e; transition: 0.1s; outline: none; padding: 0;
        }
        #bambooFieldBtn:active:not(.grayscale) { transform: translate(-50%, -48%); box-shadow: 0 1px 0 #4e342e; }
        #bambooStatus { color: #fff; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        .farmer { width: 70px; height: 100px; position: absolute; transition: all 0.6s ease-out; display: flex; flex-direction: column; align-items: center; z-index: 2; }
        .farmer-img { font-size: 35px; position: relative; line-height: 1; }
        
        .bubble {
            position: absolute; top: -30px; background: #fff; border: 2px solid #4caf50;
            padding: 2px 8px; border-radius: 12px; font-size: 13px; font-weight: 900;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); white-space: nowrap; z-index: 10; animation: bounce 0.5s ease;
        }
        @keyframes bounce { 0% { transform: scale(0.5); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        .farmer-name { font-size: 11px; background: rgba(255,255,255,0.9); padding: 1px 6px; border-radius: 5px; white-space: nowrap; margin-top: 4px; border: 1px solid #ddd; }
        /* 身分標籤樣式 */
        .host-label { border-color: #2196f3; background: #e3f2fd !important; color: #1976d2; font-weight: bold; }
        .admin-label { border-color: #f44336; background: #ffebee !important; color: #d32f2f; font-weight: bold; }
        
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto; }
        .grayscale { filter: grayscale(1); opacity: 0.4; pointer-events: none; }
        
        .btn-ui { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.2s; }
        .btn-ready { background: #ff9800; color: white; }
        .btn-start { background: #2196f3; color: white; }
        .btn-again { background: #4caf50; color: white; font-size: 18px; box-shadow: 0 4px 0 #2e7d32; width: 80%; }
        
        #chatBox { height: 80px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; text-align: left; padding: 8px; font-size: 12px; background: #fafafa; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="loginCard" class="card">
        <h2 id="welcomeName">🧑‍🌾 拔筍農場</h2> 
        <div id="loginActions">
            <button id="lineLoginBtn" class="btn-ui btn-start" onclick="liff.login()">登入 LINE</button>
            <br><br>
            <button id="enterGameBtn" class="btn-ui btn-start grayscale" onclick="enterGame()">進入田地</button>
        </div>
    </div>

    <div id="gameArea" class="card" style="display:none;">
        <div id="farmMap">
            <button id="bambooFieldBtn" class="grayscale" onclick="pressBamboo()">
                <div style="font-size: 40px;">🎋</div>
                <div id="bambooStatus"><span id="bambooCount">0</span> 隻</div>
            </button>
            <div id="playersLayer"></div>
        </div>

        <div id="gameStatusLabel" style="font-weight: bold; color: #4caf50; margin: 8px 0; font-size: 14px;">等待玩家準備...</div>

        <div id="controlPanel">
            <button id="readyBtn" class="btn-ui btn-ready" onclick="toggleReady()">準備好了</button>
            <button id="hostStartBtn" class="btn-ui btn-start" style="display:none;" onclick="hostStartGame()">開拔</button>
            <button id="againBtn" class="btn-ui btn-again" style="display:none;" onclick="resetEverything()">再來一局！</button>
        </div>

        <div id="chatBox"></div>
        <div style="display: flex; margin-bottom: 5px;">
            <input type="text" id="chatInput" placeholder="垃圾話..." style="flex:1; padding: 10px; border-radius: 20px; border: 1px solid #ccc;" onkeypress="if(event.keyCode==13) sendChat()">
            <button onclick="sendChat()" style="background:#4caf50; color:white; border:none; border-radius:20px; padding:0 15px; margin-left:5px; font-weight:bold;">送出</button>
        </div>

        <div id="adminPanel" style="display:none; border-top: 1px dashed #ccc; padding-top: 10px; margin-top: 10px;">
            <button class="btn-ui" style="font-size:10px; background:#e1f5fe;" onclick="addSimulatedPlayer()">➕ 增加模擬</button>
            <button class="btn-ui" style="font-size:10px; background:#fff3e0;" onclick="clearChats()">🧹 清空聊天</button>
            <button class="btn-ui" style="font-size:10px; background:#ffebee;" onclick="resetEverything()">🔄 重置遊戲</button>
        </div>
    </div>

    <script>
        const ADMIN_UID = "U92fe108dea907bd4f4cc28d6da14318a";
        const firebaseConfig = {
            apiKey: "AIzaSyBHWJPT6ZyvFrZE0-d6gJW-F7EfJCQfeNE",
            authDomain: "bamboo-game.firebaseapp.com",
            databaseURL: "https://bamboo-game-default-rtdb.firebaseio.com/",
            projectId: "bamboo-game",
            storageBucket: "bamboo-game.firebasestorage.app",
            messagingSenderId: "986027038887",
            appId: "1:986027038887:web:d69613c79921b12f1a6382",
            measurementId: "G-R7TYX0Q3XR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = null;
        let myReadyState = false;
        const myAvatar = ["👨‍🌾", "👩‍🌾", "🧑‍🌾", "👴", "👵"][Math.floor(Math.random()*5)];
        
        function getRandomPos() {
            let x, y;
            do { x = Math.random() * 80; } while (x > 35 && x < 65);
            do { y = Math.random() * 80; } while (y > 35 && y < 65);
            return { x, y };
        }

        async function init() {
            await liff.init({ liffId: "2009477552-iCxgtKls" });
            if (liff.isLoggedIn()) {
                document.getElementById('lineLoginBtn').style.display = "none";
                document.getElementById('enterGameBtn').classList.remove('grayscale');
                currentUser = await liff.getProfile();
                const welcomeElem = document.getElementById('welcomeName');
                if (welcomeElem) welcomeElem.innerText = "你好，" + currentUser.displayName;
                startGlobalSync();
            }
        }

        function startGlobalSync() {
            const syncUI = () => {
                db.ref('/').once('value', (rootSnap) => {
                    const data = rootSnap.val();
                    const players = data.online_players || {};
                    const gameState = data.game_state || { status: 'WAITING' };
                    const keys = Object.keys(players);
                    const hostId = keys[0];
                    const isAdminUser = (currentUser.userId === ADMIN_UID);
                    const imHostOrAdmin = (hostId === currentUser.userId || isAdminUser);

                    renderPlayers(players, hostId, gameState, imHostOrAdmin);
                    updateGameStatus(gameState, imHostOrAdmin);
                });
            };

            db.ref('online_players').on('value', syncUI);
            db.ref('game_state').on('value', syncUI);

            db.ref('chats').limitToLast(10).on('value', s => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                s.forEach(c => {
                    const m = c.val();
                    box.innerHTML += `<div><b>${m.name}:</b> ${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function renderPlayers(players, hostId, gameState, imHostOrAdmin) {
            const layer = document.getElementById('playersLayer');
            layer.innerHTML = "";
            const keys = Object.keys(players);
            const readyPlayers = keys.filter(k => players[k].isReady);
            const unreadyPlayers = keys.filter(k => !players[k].isReady);
            const isPlaying = gameState.status !== 'WAITING';

            keys.forEach((id) => {
                const p = players[id];
                if (!p || !p.name) return;

                const farmer = document.createElement('div');
                farmer.className = 'farmer';
                
                if (isPlaying) {
                    if (p.isReady) {
                        const rIdx = readyPlayers.indexOf(id);
                        const angle = (rIdx / readyPlayers.length) * 2 * Math.PI;
                        farmer.style.left = (50 + 32 * Math.cos(angle)) + "%";
                        farmer.style.top = (50 + 28 * Math.sin(angle)) + "%";
                        farmer.style.transform = "translate(-50%, -50%)";
                    } else {
                        const uIdx = unreadyPlayers.indexOf(id);
                        farmer.style.left = (5 + Math.floor(uIdx/5) * 15) + "%";
                        farmer.style.top = (5 + (uIdx%5) * 15) + "%";
                        farmer.style.opacity = "0.4";
                    }
                } else {
                    farmer.style.left = (p.posX || 0) + "%";
                    farmer.style.top = (p.posY || 0) + "%";
                }

                let bubbleHtml = "";
                let face = p.avatar || "🧑‍🌾";
                const vCount = gameState.voted_count_at_time?.[id];
                
                if (gameState.collided_players?.[id]) {
                    bubbleHtml = `<div class="bubble">💀 撞了</div>`;
                    face = "😵";
                } else if (gameState.status === 'ENDED' && gameState.lastPlayerId === id && gameState.isLoserLone) {
                    bubbleHtml = `<div class="bubble">🏜️ 可憐</div>`;
                    face = "🥺";
                } else if (vCount) {
                    bubbleHtml = `<div class="bubble">😊 ${vCount}隻</div>`;
                }

                const isHost = (id === hostId);
                const isAdmin = (id === ADMIN_UID);
                const kickAction = (imHostOrAdmin && id !== currentUser.userId) ? `<span onclick="kickPlayer('${id}')" style="color:red;font-weight:bold;margin-left:3px;cursor:pointer;">✕</span>` : "";

                // 名稱區塊標示房主與管理員
                let nameClass = "farmer-name";
                let roleIcon = "";
                if (isAdmin) { nameClass += " admin-label"; roleIcon = "👑 "; }
                else if (isHost) { nameClass += " host-label"; roleIcon = "🔵 "; }

                farmer.innerHTML = `
                    ${bubbleHtml}
                    <div class="farmer-img">${face}</div>
                    <div class="${nameClass}">
                        ${roleIcon}${p.isReady ? '🔸' : ''}${p.name}${kickAction}
                    </div>
                `;
                layer.appendChild(farmer);
            });
        }

        function updateGameStatus(state, imHostOrAdmin) {
            document.getElementById('bambooCount').innerText = state.count || 0;
            const centralBtn = document.getElementById('bambooFieldBtn');
            const readyBtn = document.getElementById('readyBtn');
            const hostStartBtn = document.getElementById('hostStartBtn');
            const againBtn = document.getElementById('againBtn');
            const statusLabel = document.getElementById('gameStatusLabel');
            
            if (state.status === 'WAITING') {
                readyBtn.classList.remove('grayscale');
                hostStartBtn.style.display = imHostOrAdmin ? "inline-block" : "none";
                hostStartBtn.classList.remove('grayscale');
                againBtn.style.display = "none";
                centralBtn.classList.add('grayscale');
                statusLabel.innerText = "等待玩家準備...";
            } else if (state.status === 'STARTING') {
                readyBtn.classList.add('grayscale');
                hostStartBtn.classList.add('grayscale');
                statusLabel.innerText = "即將開拔，手放好！";
            } else if (state.status === 'PLAYING') {
                readyBtn.classList.add('grayscale');
                hostStartBtn.style.display = "none";
                const alreadyVoted = state.voted_players?.[currentUser.userId];
                centralBtn.className = (!myReadyState || alreadyVoted) ? 'grayscale' : '';
                statusLabel.innerText = myReadyState ? (alreadyVoted ? "已拔取，等結果" : "快點擊中間竹筍！") : "觀戰中";
            } else if (state.status === 'ENDED') {
                readyBtn.classList.add('grayscale');
                centralBtn.classList.add('grayscale');
                againBtn.style.display = imHostOrAdmin ? "inline-block" : "none";
                statusLabel.innerText = "本輪結束";
            }
            
            if (imHostOrAdmin) {
                document.getElementById('adminPanel').style.display = "block";
            }
        }

        function enterGame() {
            document.getElementById('loginCard').style.display = "none";
            document.getElementById('gameArea').style.display = "block";
            const pos = getRandomPos();
            db.ref('online_players/' + currentUser.userId).set({ 
                name: currentUser.displayName, isReady: false, avatar: myAvatar, posX: pos.x, posY: pos.y 
            });
            db.ref('online_players/' + currentUser.userId).onDisconnect().remove();
        }

        function toggleReady() {
            if (document.getElementById('readyBtn').classList.contains('grayscale')) return;
            myReadyState = !myReadyState;
            db.ref('online_players/' + currentUser.userId + '/isReady').set(myReadyState);
        }

        function hostStartGame() {
            db.ref('online_players').once('value', (snap) => {
                const players = snap.val() || {};
                const readyCount = Object.keys(players).filter(k => players[k].isReady).length;
                if (readyCount < 2) { alert("至少需 2 人準備！"); return; }
                
                db.ref('game_state').set({ status: 'STARTING', count: 0 });
                setTimeout(() => {
                    db.ref('game_state').set({ 
                        status: 'PLAYING', count: 0, lastTime: 0, 
                        voted_players: {}, voted_count_at_time: {}, collided_players: {} 
                    });
                }, 1500 + Math.random() * 3000);
            });
        }

        function pressBamboo() {
            executePress(currentUser.userId, currentUser.displayName);
        }

        function executePress(uid, name) {
            const now = Date.now();
            db.ref('online_players').once('value', (pSnap) => {
                const players = pSnap.val();
                const readyIds = Object.keys(players).filter(k => players[k].isReady);
                
                db.ref('game_state').transaction((curr) => {
                    if (!curr || curr.status !== 'PLAYING' || curr.voted_players?.[uid]) return;
                    if (!curr.voted_players) curr.voted_players = {};
                    if (!curr.voted_count_at_time) curr.voted_count_at_time = {};

                    if (curr.lastTime && (now - curr.lastTime < 500)) {
                        curr.status = 'ENDED';
                        if (!curr.collided_players) curr.collided_players = {};
                        curr.collided_players[curr.lastPlayerId] = true;
                        curr.collided_players[uid] = true;
                    }

                    curr.count++;
                    curr.lastTime = now;
                    curr.lastPlayerId = uid;
                    curr.voted_players[uid] = true;
                    curr.voted_count_at_time[uid] = curr.count;

                    const votedCount = Object.keys(curr.voted_players).length;
                    if (curr.status !== 'ENDED' && votedCount === readyIds.length - 1 && readyIds.length > 1) {
                        const loserId = readyIds.find(id => !curr.voted_players[id]);
                        curr.status = 'ENDED';
                        curr.lastPlayerId = loserId;
                        curr.isLoserLone = true;
                    }
                    return curr;
                });
            });
        }

        function sendChat() {
            const i = document.getElementById('chatInput');
            if (i.value.trim() && currentUser) {
                db.ref('chats').push({ name: currentUser.displayName, text: i.value });
                i.value = "";
            }
        }
        function clearChats() { if(confirm("確定清空聊天？")) db.ref('chats').remove(); }
        
        function resetEverything() {
            db.ref('game_state').set({ status: 'WAITING', count: 0 });
            db.ref('online_players').once('value', s => {
                s.forEach(c => db.ref('online_players/'+c.key+'/isReady').set(false));
            });
            myReadyState = false;
        }

        function addSimulatedPlayer() {
            const id = 'sim_' + Date.now();
            const pos = getRandomPos();
            db.ref('online_players/' + id).set({ name: '農夫' + Math.floor(Math.random()*100), isReady: false, avatar: "🤖", posX: pos.x, posY: pos.y });
        }
        function kickPlayer(id) { if(confirm("確定踢除？")) db.ref('online_players/' + id).remove(); }
        init();
    </script>
</body>
</html>
