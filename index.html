<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>рҹҺӢ жӢ”з«№зӯҚпјҡиҫІеӨ«з”°ең°зүҲ</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: #f1f8e9; margin: 0; padding: 10px; }
        
        /* еӨ§з”°ең°е®№еҷЁ */
        #farmMap {
            width: 100%;
            height: 250px;
            background-color: #dcedc8;
            border: 4px solid #8bc34a;
            border-radius: 20px;
            position: relative;
            overflow: hidden;
            margin: 10px auto;
            background-image: radial-gradient(#aed581 10%, transparent 11%);
            background-size: 30px 30px;
        }

        /* дёӯй–“зҡ„з«№зӯҚз”°еҚҖеҹҹ */
        #bambooField {
            width: 80px;
            height: 80px;
            background: #8d6e63;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            z-index: 1;
        }

        /* иҫІеӨ«е°Ҹдәәзү©жЁЈејҸ */
        .farmer {
            width: 50px;
            height: 60px;
            position: absolute;
            transition: all 0.8s ease-in-out; /* йҖҷжҳҜж»‘еӢ•еӢ•з•«зҡ„й—ңйҚө */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 2;
        }
        .farmer-img { font-size: 30px; }
        .farmer-name { 
            font-size: 10px; 
            background: rgba(255,255,255,0.8); 
            padding: 1px 4px; 
            border-radius: 5px;
            white-space: nowrap;
        }
        .is-host { 
            border: 2px solid #2196f3 !important; 
            background-color: #e3f2fd !important;
        }
        .farmer-name.host-label {
            color: #1976d2;
            font-weight: bold;
        }

        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 450px; margin: 0 auto; }
        .bamboo-btn { background: #4caf50; color: white; border: none; width: 100px; height: 100px; border-radius: 50%; font-size: 40px; cursor: pointer; box-shadow: 0 6px 0 #2e7d32; transition: 0.1s; }
        .bamboo-btn:active { transform: translateY(3px); }
        .grayscale { filter: grayscale(1); opacity: 0.3; pointer-events: none; }
        .btn-ui { padding: 8px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin: 3px; }
        .btn-ready { background: #ff9800; color: white; }
        .btn-start { background: #2196f3; color: white; }
        #chatBox { height: 80px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; text-align: left; padding: 8px; font-size: 12px; background: #fafafa; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="loginCard" class="card">
        <h2 id="welcomeName">рҹ§‘вҖҚрҹҢҫ жӢ”зӯҚиҫІе ҙ</h2> 
        <button class="bamboo-btn" style="font-size: 20px;" onclick="enterGame()">й–Ӣе·Ҙ</button>
    </div>

    <div id="gameArea" class="card" style="display:none;">
        <div style="font-size: 22px; font-weight: bold; color: #1b5e20;">
            рҹҢұ <span id="bambooCount">0</span> йҡ»з«№зӯҚ<br>
            <span style="font-size: 16px; opacity: 0.7;">(<span id="lastPlayerName">зі»зөұ</span>)</span>
        </div>

        <div id="farmMap">
            <div id="bambooField">рҹҺӢ</div>
            <div id="playersLayer"></div>
        </div>

        <button id="pressBtn" class="bamboo-btn grayscale" onclick="pressBamboo()">рҹҺӢ</button>
        <div id="statusInfo" style="font-weight: bold; color: #4caf50; font-size: 14px;">зӯүеҫ…й–ӢжӢ”...</div>
        <div id="collisionArea" style="font-size: 12px; color: red;"></div>

        <div id="controlPanel">
            <button id="readyBtn" class="btn-ui btn-ready" onclick="toggleReady()">жә–еӮҷеҘҪдәҶ</button>
            <button id="hostStartBtn" class="btn-ui btn-start" style="display:none;" onclick="hostStartGame()">й–ӢжӢ”</button>
        </div>

        <div id="chatBox"></div>
        <div style="display: flex;">
            <input type="text" id="chatInput" placeholder="еһғеңҫи©ұ..." style="flex:1; padding: 8px; border-radius: 20px; border: 1px solid #ccc;" onkeypress="if(event.keyCode==13) sendChat()">
            <button onclick="sendChat()" style="background:#4caf50; color:white; border:none; border-radius:20px; padding:0 15px; margin-left:5px;">йҖҒеҮә</button>
        </div>

        <div style="text-align: left; border-top: 1px solid #eee; padding-top: 10px;">
            <div style="font-size: 12px; color: #666;">зҺ©е®¶ (рҹ”өжҲҝдё» / рҹ”ёжә–еӮҷ / рҹ‘‘з®ЎзҗҶ)пјҡ</div>
            <div id="playerContainer"></div>
        </div>

        <div id="adminPanel" style="display:none; margin-top:10px;">
            <button class="btn-ui" style="font-size:10px;" onclick="clearChats()">жё…иҒҠеӨ©</button>
            <button class="btn-ui" style="font-size:10px;" onclick="resetEverything()">йҮҚзҪ®йҒҠжҲІ</button>
        </div>
    </div>

    <script>
        const ADMIN_UID = "U92fe108dea907bd4f4cc28d6da14318a";

        const firebaseConfig = {
            apiKey: "AIzaSyBHWJPT6ZyvFrZE0-d6gJW-F7EfJCQfeNE",
            authDomain: "bamboo-game.firebaseapp.com",
            databaseURL: "https://bamboo-game-default-rtdb.firebaseio.com/",
            projectId: "bamboo-game",
            storageBucket: "bamboo-game.firebasestorage.app",
            messagingSenderId: "986027038887",
            appId: "1:986027038887:web:d69613c79921b12f1a6382",
            measurementId: "G-R7TYX0Q3XR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = null;
        let isImHostOrAdmin = false;
        let myReadyState = false;
        // йҡЁж©ҹз”ҹжҲҗи§’иүІзҡ®иҶҡиҲҮеә§жЁҷ
        const myAvatar = ["рҹ‘ЁвҖҚрҹҢҫ", "рҹ‘©вҖҚрҹҢҫ", "рҹ§‘вҖҚрҹҢҫ", "рҹ‘ҙ", "рҹ‘ө"][Math.floor(Math.random()*5)];
        const myRandomPos = { x: Math.random()*80, y: Math.random()*70 }; 

        async function init() {
            await liff.init({ liffId: "2009477552-iCxgtKls" });
            if (!liff.isLoggedIn()) { 
                liff.login(); 
            } else {
                currentUser = await liff.getProfile();
                
                // еҠ е…ҘйҳІйҢҜеҲӨж–·пјҡе…ҲзўәиӘҚе…ғзҙ еӯҳеңЁеҶҚиЁӯе®ҡеҖј
                const welcomeElem = document.getElementById('welcomeName');
                if (welcomeElem) {
                    welcomeElem.innerText = "дҪ еҘҪпјҢ" + currentUser.displayName;
                }
                
                startGlobalSync();
            }
        }

        function startGlobalSync() {
            db.ref('online_players').on('value', (snap) => {
                const players = snap.val() || {};
                const keys = Object.keys(players);
                const hostId = keys[0];
                const isAdmin = (currentUser.userId === ADMIN_UID);
                const imHostOrAdmin = (hostId === currentUser.userId || isAdmin);
                
                document.getElementById('hostStartBtn').style.display = imHostOrAdmin ? "inline-block" : "none";
                const adminPanel = document.getElementById('adminPanel');
                if (adminPanel) adminPanel.style.display = imHostOrAdmin ? "block" : "none";

                const container = document.getElementById('playerContainer');
                container.innerHTML = "";
                keys.forEach(id => {
                    const p = players[id];
                    const isHost = (id === hostId);
                    const tag = document.createElement('span');
                    tag.className = `player-tag ${isHost ? 'is-host' : ''} ${p.isReady ? 'is-ready' : ''}`;
                    tag.innerText = (isHost ? "рҹ‘‘ " : "") + (p.isReady ? "рҹ”ё " : "") + p.name;
                    container.appendChild(tag);
                });

                // жёІжҹ“ең°ең–дёҠзҡ„иҫІеӨ«
                const layer = document.getElementById('playersLayer');
                layer.innerHTML = "";
                keys.forEach((id, index) => {
                    const p = players[id];
                    if (!p) return;
                    const isHost = (id === hostId);
                    const farmer = document.createElement('div');
                    farmer.className = 'farmer';
                    
                    // еә§жЁҷиЁҲз®—...
                    if (p.isReady) {
                        const angle = (index / keys.length) * 2 * Math.PI;
                        const radius = 18; 
                        farmer.style.left = (50 + radius * Math.cos(angle)) + "%";
                        farmer.style.top = (50 + radius * Math.sin(angle)) + "%";
                        farmer.style.transform = "translate(-50%, -50%)";
                    } else {
                        farmer.style.left = (p.posX || 0) + "%";
                        farmer.style.top = (p.posY || 0) + "%";
                    }

                    // --- йҖҷиЈЎжңғз”ЁеҲ° imHostOrAdminпјҢзҸҫеңЁеҗҚзЁұжӯЈзўәдәҶ ---
                    const kickHtml = (imHostOrAdmin && id !== currentUser.userId) ? 
                        `<span onclick="kickPlayer('${id}')" style="color:red; cursor:pointer; margin-left:3px;">вң•</span>` : "";

                    farmer.innerHTML = `
                        <div class="farmer-img">${p.isReady ? 'вӣҸпёҸ' : (p.avatar || 'рҹ§‘вҖҚрҹҢҫ')}</div>
                        <div class="farmer-name ${isHost ? 'host-label' : ''}">
                            ${isHost ? 'рҹ‘‘' : ''}${p.name}${kickHtml}
                        </div>
                    `;
                    layer.appendChild(farmer);
                });

                const allReady = keys.length > 1 && keys.every(k => players[k].isReady);
                document.getElementById('hostStartBtn').className = `btn-ui btn-start ${ (allReady || isAdmin) ? '' : 'grayscale'}`;
            });

            db.ref('game_state').on('value', (snap) => {
                const state = snap.val() || { count: 0, status: 'WAITING', lastPlayer: "зі»зөұ" };
                const isWaiting = (state.status === 'WAITING');
                const readyBtn = document.getElementById('readyBtn');
                const hostStartBtn = document.getElementById('hostStartBtn');

                document.getElementById('bambooCount').innerText = state.count;
                document.getElementById('lastPlayerName').innerText = state.lastPlayer;
                const btn = document.getElementById('pressBtn');
                const info = document.getElementById('statusInfo');
                const coll = document.getElementById('collisionArea');

                if (!isWaiting) {
                    readyBtn.classList.add('grayscale');
                    hostStartBtn.classList.add('grayscale');
                } else {
                    readyBtn.classList.remove('grayscale');
                    // е„ӘеҢ–пјҡеҰӮжһңжҳҜзӯүеҫ…дёӯпјҢй–ӢжӢ”жҢүйҲ•иҰҒж №ж“ҡгҖҢжҳҜеҗҰе…Ёе“Ўжә–еӮҷгҖҚдҫҶжұәе®ҡжҳҜеҗҰи§ЈйҷӨзҒ°йҡҺ
                    db.ref('online_players').once('value', (pSnap) => {
                        const p = pSnap.val() || {};
                        const pKeys = Object.keys(p);
                        const allReady = pKeys.length > 1 && pKeys.every(k => p[k].isReady);
                        const isAdmin = (currentUser.userId === ADMIN_UID);
                        
                        if (allReady || isAdmin) {
                            hostStartBtn.classList.remove('grayscale');
                        } else {
                            hostStartBtn.classList.add('grayscale');
                        }
                    });
                }

                if (state.status === 'PLAYING') {
                    coll.innerHTML = "";
                    const voted = state.voted_players && state.voted_players[currentUser.userId];
                    btn.className = `bamboo-btn ${voted ? 'grayscale' : ''}`;
                    info.innerText = voted ? "зӯүеҫ…зөҗжһң..." : "еҝ«жӢ”пјҒ";
                } else if (state.status === 'ENDED') {
                    btn.classList.add('grayscale');
                    info.innerHTML = "рҹ’Ҙ ж’һзӯҚдәҶпјҒ";
                    if (state.collided_players) {
                        coll.innerText = "еҗҢжҷӮж“ е…Ҙпјҡ" + Object.values(state.collided_players).join(", ");
                    }
                } else {
                    btn.classList.add('grayscale');
                    info.innerText = state.status === 'STARTING' ? "йҡЁж©ҹеҖ’ж•ё..." : "зӯүеҫ…й–ӢжӢ”...";
                }
            });

            db.ref('chats').limitToLast(10).on('value', s => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                s.forEach(c => {
                    const m = c.val();
                    box.innerHTML += `<div><b>${m.name}:</b> ${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function enterGame() {
            document.getElementById('loginCard').style.display = "none";
            document.getElementById('gameArea').style.display = "block";
            db.ref('online_players/' + currentUser.userId).set({ 
                name: currentUser.displayName, 
                isReady: false,
                avatar: myAvatar,
                posX: myRandomPos.x,
                posY: myRandomPos.y
            });
            db.ref('online_players/' + currentUser.userId).onDisconnect().remove();
        }

        function toggleReady() {
            myReadyState = !myReadyState;
            db.ref('online_players/' + currentUser.userId + '/isReady').set(myReadyState);
            document.getElementById('readyBtn').innerText = myReadyState ? "еҸ–ж¶Ҳжә–еӮҷ" : "жә–еӮҷеҘҪдәҶ";
        }

        function hostStartGame() {
            db.ref('game_state').set({ status: 'STARTING', count: 0, lastPlayer: "жә–еӮҷдёӯ" });

            const delay = Math.random() * 5000;
            setTimeout(() => {
                db.ref('game_state').update({
                    status: 'PLAYING',
                    count: 0,
                    lastTime: 0, // дҝ®еҫ© 1пјҡиЁӯзӮә 0пјҢз¬¬дёҖеҖӢдәәжҢүзө•е°ҚдёҚжңғж’һеҲ°зі»зөұ
                    lastPlayer: "жІ’дәә",
                    voted_players: {},
                    collided_players: {}
                });
            }, delay);
        }

        function pressBamboo() {
            const now = Date.now();
            db.ref('game_state').transaction((curr) => {
                if (!curr || curr.status !== 'PLAYING' || (curr.voted_players && curr.voted_players[currentUser.userId])) return;
                if (!curr.voted_players) curr.voted_players = {};
                if (now - curr.lastTime < 800) {
                    curr.status = 'ENDED';
                    if (!curr.collided_players) curr.collided_players = {};
                    curr.collided_players[curr.lastPlayerId || 'sys'] = curr.lastPlayer;
                    curr.collided_players[currentUser.userId] = currentUser.displayName;
                }
                curr.count++;
                curr.lastTime = now;
                curr.lastPlayer = currentUser.displayName;
                curr.lastPlayerId = currentUser.userId;
                curr.voted_players[currentUser.userId] = true;
                return curr;
            });
        }

        function sendChat() {
            const i = document.getElementById('chatInput');
            if (i.value.trim()) db.ref('chats').push({ name: currentUser.displayName, text: i.value });
            i.value = "";
        }
        function clearChats() { if(confirm("жё…з©әпјҹ")) db.ref('chats').remove(); }
        function resetEverything() { if(confirm("йҮҚзҪ®пјҹ")) {
            db.ref('game_state').set({ count: 0, status: 'WAITING', lastPlayer: "зі»зөұ" });
            db.ref('online_players').once('value', s => s.forEach(c => c.ref.update({ isReady: false })));
        }}

        function kickPlayer(targetId) {
            if (confirm("зўәе®ҡиҰҒиёўйҷӨи©ІзҺ©е®¶е—Һпјҹ")) {
                db.ref('online_players/' + targetId).remove();
            }
        }
        init();
    </script>
</body>
</html>
