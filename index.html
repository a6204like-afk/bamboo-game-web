<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎋 拔竹筍：究極判定版</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: #e8f5e9; padding: 10px; margin: 0; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 10px auto; }
        .bamboo-btn { background: #4caf50; color: white; border: none; width: 120px; height: 120px; border-radius: 50%; font-size: 50px; cursor: pointer; box-shadow: 0 6px 0 #2e7d32; transition: 0.1s; margin: 15px 0; position: relative; }
        .bamboo-btn:active { transform: translateY(3px); box-shadow: 0 3px 0 #2e7d32; }
        .grayscale { filter: grayscale(1); opacity: 0.3; pointer-events: none; }
        .btn-ui { padding: 8px 15px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin: 3px; font-size: 12px; }
        .btn-ready { background: #ff9800; color: white; }
        .btn-start { background: #2196f3; color: white; }
        .btn-danger { background: #f44336; color: white; opacity: 0.6; }
        .count-num { font-size: 48px; font-weight: bold; color: #1b5e20; }
        #chatBox { height: 100px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; text-align: left; padding: 10px; font-size: 13px; background: #fafafa; margin: 10px 0; }
        .player-tag { display: inline-block; background: #c8e6c9; padding: 3px 8px; border-radius: 10px; margin: 2px; font-size: 11px; }
        .is-ready { background: #ffcc80 !important; }
        .is-host { border: 2px solid #2196f3; }
        #gameArea { display: none; }
        .collision-list { font-size: 14px; color: #d32f2f; font-weight: bold; background: #ffebee; border-radius: 10px; padding: 5px; margin-top: 5px; }
    </style>
</head>
<body>

    <div id="loginCard" class="card">
        <h2 id="welcomeName">🌱 載入中...</h2>
        <button class="bamboo-btn" style="font-size: 20px;" onclick="enterGame()">進入遊戲室</button>
    </div>

    <div id="gameArea" class="card">
        <div class="count-num">🌱 <span id="bambooCount">0</span> 隻竹筍 (<span id="lastPlayerName">系統</span>)</div>
        <button id="pressBtn" class="bamboo-btn grayscale" onclick="pressBamboo()">🎋</button>
        <div id="statusInfo" style="font-weight: bold; color: #4caf50;">等待開拔...</div>
        <div id="collisionArea"></div>

        <div id="controlPanel" style="margin-top:10px;">
            <button id="readyBtn" class="btn-ui btn-ready" onclick="toggleReady()">準備好了</button>
            <button id="hostStartBtn" class="btn-ui btn-start" style="display:none;" onclick="hostStartGame()">開拔</button>
        </div>

        <div id="chatBox"></div>
        <div style="display: flex; justify-content: center; margin-bottom: 5px;">
            <input type="text" id="chatInput" placeholder="輸入垃圾話..." style="width: 70%; padding: 8px; border: 1px solid #ccc; border-radius: 20px;" onkeypress="if(event.keyCode==13) sendChat()">
            <button onclick="sendChat()" style="width: 20%; padding: 8px; border: none; background: #4caf50; color: white; border-radius: 20px; margin-left: 5px;">送出</button>
        </div>

        <div style="text-align: left; border-top: 1px solid #eee; padding-top: 10px;">
            <div style="font-size: 12px; color: #666;">玩家 (🔵房主 / 🔸準備 / 👑管理)：</div>
            <div id="playerContainer"></div>
        </div>
        
        <div id="adminPanel" style="display:none; margin-top:15px; border-top:1px dashed #ccc; padding-top:10px;">
            <button class="btn-ui btn-danger" onclick="clearChats()">清除聊天</button>
            <button id="resetBtn" class="btn-ui btn-danger" onclick="resetEverything()">重置遊戲</button>
        </div>
    </div>

    <script>
        const ADMIN_UID = "U92fe108dea907bd4f4cc28d6da14318a";

        const firebaseConfig = {
            apiKey: "AIzaSyBHWJPT6ZyvFrZE0-d6gJW-F7EfJCQfeNE",
            authDomain: "bamboo-game.firebaseapp.com",
            databaseURL: "https://bamboo-game-default-rtdb.firebaseio.com/",
            projectId: "bamboo-game",
            storageBucket: "bamboo-game.firebasestorage.app",
            messagingSenderId: "986027038887",
            appId: "1:986027038887:web:d69613c79921b12f1a6382",
            measurementId: "G-R7TYX0Q3XR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = null;
        let isImHostOrAdmin = false;
        let myReadyState = false;

        async function init() {
            await liff.init({ liffId: "2009477552-iCxgtKls" });
            if (!liff.isLoggedIn()) { liff.login(); }
            else {
                currentUser = await liff.getProfile();
                document.getElementById('welcomeName').innerText = "你好，" + currentUser.displayName;
                startGlobalSync();
            }
        }

        function startGlobalSync() {
            db.ref('online_players').on('value', (snap) => {
                const players = snap.val() || {};
                const keys = Object.keys(players);
                const hostId = keys[0];
                const isAdmin = (currentUser.userId === ADMIN_UID);
                isImHostOrAdmin = (hostId === currentUser.userId || isAdmin);
                
                document.getElementById('hostStartBtn').style.display = isImHostOrAdmin ? "inline-block" : "none";
                document.getElementById('adminPanel').style.display = isImHostOrAdmin ? "block" : "none";

                let allReady = keys.length > 1;
                const container = document.getElementById('playerContainer');
                container.innerHTML = "";
                keys.forEach(id => {
                    const p = players[id];
                    if (!p.isReady) allReady = false;
                    container.innerHTML += `<span class="player-tag ${id===hostId?'is-host':''} ${p.isReady?'is-ready':''}">
                        ${id===ADMIN_UID?'👑':''}${id===hostId?'🔵':''}${p.isReady?'🔸':''}${p.name}</span>`;
                });

                const startBtn = document.getElementById('hostStartBtn');
                startBtn.className = `btn-ui btn-start ${(allReady || isAdmin) ? '' : 'grayscale'}`;
            });

            db.ref('game_state').on('value', (snap) => {
                const state = snap.val() || { count: 0, status: 'WAITING', lastPlayer: "系統" };
                document.getElementById('bambooCount').innerText = state.count;
                document.getElementById('lastPlayerName').innerText = state.lastPlayer || "系統";
                const btn = document.getElementById('pressBtn');
                const info = document.getElementById('statusInfo');
                const collisionArea = document.getElementById('collisionArea');

                // 判斷自己是否按過
                const hasIVoted = state.voted_players && state.voted_players[currentUser.userId];

                if (state.status === 'PLAYING') {
                    collisionArea.innerHTML = "";
                    if (hasIVoted) {
                        btn.classList.add('grayscale');
                        info.innerText = "你已拔過，等待結果...";
                    } else {
                        btn.classList.remove('grayscale');
                        info.innerText = "快拔！每人限一次";
                    }
                } else if (state.status === 'ENDED') {
                    btn.classList.add('grayscale');
                    info.innerHTML = `<span style="color:red">💥 撞筍了！</span>`;
                    // 顯示所有同時按下的人
                    if (state.collided_players) {
                        const names = Object.values(state.collided_players).join(", ");
                        collisionArea.innerHTML = `<div class="collision-list"><br>💀 失敗者：${names}和${state.lastPlayer}</div>`;
                    }
                } else {
                    btn.classList.add('grayscale');
                    info.innerText = state.status === 'STARTING' ? "隨機倒數中..." : "等待開拔...";
                }
            });

            db.ref('chats').limitToLast(15).on('value', (snap) => {
                const box = document.getElementById('chatBox');
                box.innerHTML = "";
                snap.forEach(c => {
                    const m = c.val();
                    box.innerHTML += `<div><span style="font-weight:bold;color:#2e7d32;">${m.name}:</span> ${m.text}</div>`;
                });
                box.scrollTop = box.scrollHeight;
            });
        }

        function enterGame() {
            document.getElementById('loginCard').style.display = "none";
            document.getElementById('gameArea').style.display = "block";
            db.ref('online_players/' + currentUser.userId).set({ name: currentUser.displayName, isReady: false });
            db.ref('online_players/' + currentUser.userId).onDisconnect().remove();
        }

        function toggleReady() {
            myReadyState = !myReadyState;
            db.ref('online_players/' + currentUser.userId + '/isReady').set(myReadyState);
            document.getElementById('readyBtn').innerText = myReadyState ? "取消準備" : "準備好了";
        }

        function hostStartGame() {
            db.ref('game_state').set({ status: 'STARTING', count: 0 });
            setTimeout(() => {
                db.ref('game_state').update({
                    status: 'PLAYING',
                    lastTime: Date.now(),
                    voted_players: {},
                    collided_players: {}
                });
            }, Math.random() * 5000);
        }

        function pressBamboo() {
            const now = Date.now();
            db.ref('game_state').transaction((curr) => {
                if (!curr || curr.status !== 'PLAYING') return;
                if (!curr.voted_players) curr.voted_players = {};
                if (curr.voted_players[currentUser.userId]) return; // 每人限一次

                // 判定撞筍 (0.8秒內有人按過)
                if (now - curr.lastTime < 800) {
                    curr.status = 'ENDED';
                    if (!curr.collided_players) curr.collided_players = {};
                    // 把上一個和這一個都加入同時按下名單
                    curr.collided_players[curr.lastPlayerId || 'prev'] = curr.lastPlayer;
                    curr.collided_players[currentUser.userId] = currentUser.displayName;
                }

                curr.count++;
                curr.lastTime = now;
                curr.lastPlayer = currentUser.displayName;
                curr.lastPlayerId = currentUser.userId;
                curr.voted_players[currentUser.userId] = true;
                return curr;
            });
        }

        function sendChat() {
            const input = document.getElementById('chatInput');
            if (!input.value.trim()) return;
            db.ref('chats').push({ name: currentUser.displayName, text: input.value });
            input.value = "";
        }

        function clearChats() {
            if (isImHostOrAdmin && confirm("確定要清空所有聊天紀錄嗎？")) db.ref('chats').remove();
        }

        function resetEverything() {
            if (isImHostOrAdmin && confirm("強制重置遊戲？")) {
                db.ref('game_state').set({ count: 0, status: 'WAITING' });
                db.ref('online_players').once('value', s => s.forEach(c => c.ref.update({ isReady: false })));
            }
        }

        init();
    </script>
</body>
</html>
