<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎋 拔竹筍 2.0：強化測試版</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: #f1f8e9; margin: 0; padding: 10px; min-height: 100vh; }
        
        #farmMap {
            width: 100%; height: 350px; background-color: #dcedc8; border: 4px solid #8bc34a;
            border-radius: 20px 20px 0 0; position: relative; overflow: hidden; margin: 5px auto 0 auto;
            background-image: radial-gradient(#aed581 10%, transparent 11%); background-size: 30px 30px;
            touch-action: none;
        }

        #waitingArea {
            width: 100%; height: 100px; background-color: #fff; border: 4px solid #8bc34a;
            border-top: none; border-radius: 0 0 20px 20px; position: relative; margin-bottom: 10px;
            background-image: linear-gradient(to right, #f5f5f5 50%, #ffffff 50%);
        }
        .area-label { position: absolute; bottom: 5px; font-size: 10px; color: #999; font-weight: bold; }

        .bamboo-item {
            position: absolute; font-size: 40px; cursor: pointer; z-index: 100; /* 極高層級，防止點不到 */
            transition: transform 0.2s; animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0) rotate(-20deg); } to { transform: scale(1) rotate(0); } }

        .farmer { 
            width: 60px; height: 80px; position: absolute; display: flex; flex-direction: column; 
            align-items: center; z-index: 10; cursor: grab; user-select: none;
            transition: left 0.5s ease-out, top 0.5s ease-out;
        }
        .farmer-img { font-size: 30px; line-height: 1; pointer-events: none; }
        .bubble {
            position: absolute; top: -30px; background: #fff; border: 2px solid #4caf50;
            padding: 2px 6px; border-radius: 10px; font-size: 11px; font-weight: 900;
            white-space: nowrap; z-index: 15; pointer-events: none;
        }
        .farmer-name { font-size: 10px; background: rgba(255,255,255,0.9); padding: 1px 4px; border-radius: 4px; white-space: nowrap; border: 1px solid #ddd; pointer-events: none; }
        .host-label { border-color: #2196f3; background: #e3f2fd !important; color: #1976d2; }
        .admin-label { border-color: #f44336; background: #ffebee !important; color: #d32f2f; }
        
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto 20px auto; }
        .grayscale { filter: grayscale(1); opacity: 0.5; }
        .btn-ui { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.2s; }
        .btn-ready { background: #ff9800; color: white; }
        .btn-start { background: #2196f3; color: white; }
        .btn-again { background: #4caf50; color: white; font-size: 18px; width: 80%; }
        
        #chatBox { height: 80px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; text-align: left; padding: 8px; font-size: 12px; background: #fafafa; margin: 10px 0; }
        #timerLabel { font-size: 20px; color: #f44336; font-weight: bold; }
        .sim-ctrl { display: flex; gap: 2px; margin-top: 2px; pointer-events: auto !important; }
        .sim-btn { font-size: 9px; padding: 1px 3px; background: #eee; border: 1px solid #ccc; border-radius: 3px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loginCard" class="card">
        <h2>🧑‍🌾 拔筍農場 2.0</h2> 
        <button id="lineLoginBtn" class="btn-ui btn-start" onclick="liff.login()">登入 LINE</button>
        <button id="enterGameBtn" class="btn-ui btn-start grayscale" onclick="enterGame()">進入田地</button>
    </div>

    <div id="gameArea" class="card" style="display:none;">
        <div id="timerLabel"></div>
        <div id="farmMap">
            <div id="bambooLayer"></div>
            <div id="playersLayer"></div>
        </div>
        <div id="waitingArea">
            <div class="area-label" style="left: 10px;">⬅️ 休息中 (未準備)</div>
            <div class="area-label" style="right: 10px;">準備中 ➡️</div>
        </div>

        <div id="gameStatusLabel" style="font-weight: bold; color: #4caf50; margin: 5px 0;">等待開拔...</div>

        <div id="controlPanel">
            <button id="readyBtn" class="btn-ui btn-ready" onclick="toggleReady()">準備好了</button>
            <button id="moveModeBtn" class="btn-ui" style="background:#9c27b0; color:white;" onclick="toggleMoveMode()">自由移動：關</button>
            <button id="hostStartBtn" class="btn-ui btn-start" style="display:none;" onclick="hostStartGame()">開拔！</button>
            <button id="againBtn" class="btn-ui btn-again" style="display:none;" onclick="resetEverything()">再來一局</button>
        </div>

        <div id="chatBox"></div>
        <div style="display: flex;">
            <input type="text" id="chatInput" placeholder="聊兩句..." style="flex:1; padding: 10px; border-radius: 20px; border: 1px solid #ccc;">
            <button onclick="sendChat()" class="btn-ui" style="background:#4caf50; color:white; margin:0 0 0 5px;">送出</button>
        </div>

        <div id="adminPanel" style="display:none; border-top: 1px dashed #ccc; margin-top: 15px; padding-top: 10px;">
            <div style="font-size: 11px; color: #f44336; font-weight: bold;">👑 管理員後台</div>
            <button class="btn-ui" style="font-size:10px; background:#e1f5fe;" onclick="addSimulatedPlayer()">➕ 增加機器人</button>
            <button class="btn-ui" style="font-size:10px; background:#fff3e0;" onclick="clearChats()">🧹 清空</button>
        </div>
    </div>

    <script>
        const ADMIN_UID = "U92fe108dea907bd4f4cc28d6da14318a";
        const firebaseConfig = {
            apiKey: "AIzaSyBHWJPT6ZyvFrZE0-d6gJW-F7EfJCQfeNE",
            authDomain: "bamboo-game.firebaseapp.com",
            databaseURL: "https://bamboo-game-default-rtdb.firebaseio.com/",
            projectId: "bamboo-game",
            storageBucket: "bamboo-game.firebasestorage.app",
            messagingSenderId: "986027038887",
            appId: "1:986027038887:web:d69613c79921b12f1a6382"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = null;
        let myReadyState = false;
        let isMoveMode = false;
        let dragTarget = null;
        let gameTimer = null;
        const myAvatar = ["👨‍🌾", "👩‍🌾", "🧑‍🌾", "👴", "👵"][Math.floor(Math.random()*5)];

        async function init() {
            await liff.init({ liffId: "2009477552-iCxgtKls" });
            if (liff.isLoggedIn()) {
                document.getElementById('lineLoginBtn').style.display = "none";
                document.getElementById('enterGameBtn').classList.remove('grayscale');
                currentUser = await liff.getProfile();
                startGlobalSync();
            }
        }

        function startGlobalSync() {
            db.ref('/').on('value', (rootSnap) => {
                const data = rootSnap.val();
                if (!data) return;
                const players = data.online_players || {};
                const gameState = data.game_state || { status: 'WAITING' };
                const hostId = Object.keys(players)[0];
                const isAdminUser = (currentUser.userId === ADMIN_UID);
                myReadyState = players[currentUser.userId]?.isReady || false;

                renderPlayers(players, hostId, gameState, isAdminUser);
                renderBamboos(gameState.bamboos || {});
                updateGameStatus(gameState, hostId === currentUser.userId, isAdminUser);
            });

            db.ref('chats').limitToLast(10).on('value', s => {
                const box = document.getElementById('chatBox'); box.innerHTML = "";
                s.forEach(c => { const m = c.val(); box.innerHTML += `<div><b>${m.name}:</b> ${m.text}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        }

        function renderPlayers(players, hostId, gameState, isAdminUser) {
            const layer = document.getElementById('playersLayer');
            const keys = Object.keys(players);
            const isPlaying = gameState.status !== 'WAITING';
            const notReadyKeys = keys.filter(k => !players[k].isReady);
            const readyKeys = keys.filter(k => players[k].isReady);

            keys.forEach((id) => {
                let farmer = document.getElementById('farmer_' + id);
                const p = players[id];
                if (!farmer) {
                    farmer = document.createElement('div');
                    farmer.id = 'farmer_' + id;
                    farmer.className = 'farmer';
                    farmer.addEventListener('mousedown', (e) => startDrag(e, id));
                    farmer.addEventListener('touchstart', (e) => startDrag(e, id), { passive: false });
                    layer.appendChild(farmer);
                }

                if (isPlaying) {
                    if (p.targetX !== undefined && p.targetX !== null) {
                        farmer.style.left = p.targetX + "%";
                        farmer.style.top = p.targetY + "%";
                        farmer.classList.remove('grayscale');
                    } else if (p.isReady) {
                        const idx = readyKeys.filter(k => !players[k].targetX).indexOf(id);
                        farmer.style.left = (60 + (idx % 3) * 12) + "%";
                        farmer.style.top = (82 + Math.floor(idx / 3) * 5) + "%";
                        farmer.classList.remove('grayscale');
                    } else {
                        const idx = notReadyKeys.indexOf(id);
                        farmer.style.left = (5 + (idx % 3) * 12) + "%";
                        farmer.style.top = (82 + Math.floor(idx / 3) * 5) + "%";
                        farmer.classList.add('grayscale');
                    }
                } else {
                    farmer.style.left = (p.posX || 0) + "%";
                    farmer.style.top = (p.posY || 0) + "%";
                    farmer.classList.toggle('grayscale', !p.isReady);
                }

                let face = p.avatar || "🧑‍🌾";
                let bubble = "";
                if (p.targetX !== undefined && p.targetX !== null) { 
                    face = "😊"; 
                    const order = p.votedOrder ? p.votedOrder + "隻" : "拔到了！";
                    bubble = `<div class="bubble">😊 ${order}</div>`; 
                }
                
                if (gameState.status === 'ENDED' && (gameState.lastPlayerId === id || (gameState.isTimeout && !p.targetX && p.isReady))) { 
                    face = "🥺"; bubble = `<div class="bubble">嗚嗚...</div>`; 
                }

                const isAdmin = (id === ADMIN_UID);
                const isHost = (id === hostId);
                const isSim = id.startsWith('sim_');
                
                // 管理員專用的機器人控制按鈕
                let simControls = "";
                if (isAdminUser && isSim && !isPlaying) {
                    simControls = `<div class="sim-ctrl">
                        <button class="sim-btn" onclick="event.stopPropagation(); simulateReady('${id}', true)">備</button>
                        <button class="sim-btn" onclick="event.stopPropagation(); simulateReady('${id}', false)">撤</button>
                    </div>`;
                }

                const kickAction = (isAdminUser && id !== currentUser.userId) ? `<span style="color:red; cursor:pointer;" onclick="event.stopPropagation(); kickPlayer('${id}')">✕</span>` : "";
                let nameClass = "farmer-name";
                if (isAdmin) nameClass += " admin-label";
                else if (isHost) nameClass += " host-label";

                farmer.innerHTML = `${bubble}<div class="farmer-img">${face}</div><div class="${nameClass}">${p.name}${kickAction}</div>${simControls}`;
            });

            Array.from(layer.children).forEach(child => { if (!players[child.id.replace('farmer_', '')]) child.remove(); });
        }

        function renderBamboos(bamboos) {
            const layer = document.getElementById('bambooLayer');
            const now = Date.now();
            Object.keys(bamboos).forEach(bid => {
                const b = bamboos[bid];
                let elem = document.getElementById('bamboo_' + bid);
                if (!b.claimedBy && now >= b.appearAt) {
                    if (!elem) {
                        elem = document.createElement('div');
                        elem.id = 'bamboo_' + bid;
                        elem.className = 'bamboo-item';
                        elem.innerText = "🎋";
                        elem.style.left = b.x + "%";
                        elem.style.top = b.y + "%";
                        elem.onclick = () => claimBamboo(bid);
                        layer.appendChild(elem);
                    }
                } else if (elem) { elem.remove(); }
            });
            Array.from(layer.children).forEach(child => { if (!bamboos[child.id.replace('bamboo_', '')]) child.remove(); });
        }

        function claimBamboo(bid, simulatedId = null) {
            const uid = simulatedId || currentUser.userId;
            db.ref('/').once('value', (snap) => {
                const data = snap.val();
                const p = data.online_players[uid];
                if (p && p.targetX !== undefined && p.targetX !== null) return; 

                const bamboos = data.game_state.bamboos || {};
                const claimedCount = Object.keys(bamboos).filter(k => bamboos[k].claimedBy).length;

                db.ref('game_state/bamboos/' + bid).transaction((bamboo) => {
                    if (bamboo && !bamboo.claimedBy) {
                        bamboo.claimedBy = uid;
                        db.ref('online_players/' + uid).update({ 
                            targetX: bamboo.x, 
                            targetY: bamboo.y,
                            votedOrder: claimedCount + 1
                        });
                        checkGameEnd();
                        return bamboo;
                    }
                });
            });
        }

        function checkGameEnd() {
            db.ref('/').once('value', s => {
                const data = s.val();
                if (data.game_state.status !== 'PLAYING') return;
                const players = data.online_players;
                const bamboos = data.game_state.bamboos || {};
                const readyIds = Object.keys(players).filter(k => players[k].isReady);
                const claimedCount = Object.keys(bamboos).filter(k => bamboos[k].claimedBy).length;

                if (claimedCount >= readyIds.length - 1 && readyIds.length > 1) {
                    const loserId = readyIds.find(id => players[id].targetX === undefined || players[id].targetX === null);
                    db.ref('game_state').update({ status: 'ENDED', lastPlayerId: loserId });
                    clearInterval(gameTimer);
                }
            });
        }

        function hostStartGame() {
            db.ref('online_players').once('value', s => {
                const players = s.val() || {};
                const readyIds = Object.keys(players).filter(k => players[k].isReady);
                if (readyIds.length < 2) { alert("至少需2人準備！"); return; }
                
                const bamboos = {};
                const count = readyIds.length - 1;
                for(let i=0; i<count; i++) {
                    bamboos['b'+i] = {
                        x: 10 + Math.random()*75,
                        y: 10 + Math.random()*60,
                        appearAt: Date.now() + 2000 + Math.random()*13000,
                        claimedBy: null
                    };
                }
                db.ref('game_state').set({ status: 'PLAYING', bamboos: bamboos });
                readyIds.forEach(id => db.ref('online_players/'+id).update({ targetX: null, targetY: null, votedOrder: null }));

                let timeLeft = 30;
                document.getElementById('timerLabel').innerText = "剩餘時間：" + timeLeft;
                clearInterval(gameTimer);
                gameTimer = setInterval(() => {
                    timeLeft--;
                    document.getElementById('timerLabel').innerText = "剩餘時間：" + timeLeft;
                    if (timeLeft <= 0) {
                        clearInterval(gameTimer);
                        db.ref('game_state').update({ status: 'ENDED', isTimeout: true });
                    }
                }, 1000);
            });
        }

        function updateGameStatus(state, imHost, imAdmin) {
            const statusLabel = document.getElementById('gameStatusLabel');
            const againBtn = document.getElementById('againBtn');
            const hostBtn = document.getElementById('hostStartBtn');

            if (imHost || imAdmin) {
                againBtn.style.display = "inline-block";
                againBtn.innerText = (state.status === 'ENDED') ? "再來一局" : "重置遊戲";
            } else { againBtn.style.display = "none"; }

            if (state.status === 'WAITING') {
                statusLabel.innerText = "等待玩家準備...";
                hostBtn.style.display = imHost ? "inline-block" : "none";
                document.getElementById('timerLabel').innerText = "";
            } else if (state.status === 'PLAYING') {
                statusLabel.innerText = "🎋 竹筍冒出來了！快拔！";
                hostBtn.style.display = "none";
            } else {
                statusLabel.innerText = state.isTimeout ? "時間到！沒拔完的都輸了！" : "遊戲結束！";
                clearInterval(gameTimer);
            }
            document.getElementById('adminPanel').style.display = imAdmin ? "block" : "none";
        }

        function enterGame() {
            document.getElementById('loginCard').style.display = "none";
            document.getElementById('gameArea').style.display = "block";
            db.ref('online_players/' + currentUser.userId).set({ 
                name: currentUser.displayName, isReady: false, avatar: myAvatar, 
                posX: 10 + Math.random()*80, posY: 82 
            });
            db.ref('online_players/' + currentUser.userId).onDisconnect().remove();
        }

        function toggleReady() { db.ref('online_players/' + currentUser.userId + '/isReady').set(!myReadyState); }

        function toggleMoveMode() {
            isMoveMode = !isMoveMode;
            const btn = document.getElementById('moveModeBtn');
            btn.innerText = "自由移動：" + (isMoveMode ? "開" : "關");
            btn.style.background = isMoveMode ? "#4caf50" : "#9c27b0";
        }

        function startDrag(e, id) {
            if (e.target.classList.contains('sim-btn') || !isMoveMode) return;
            dragTarget = id;
            const moveHandler = (ev) => {
                ev.preventDefault();
                const rect = document.getElementById('farmMap').getBoundingClientRect();
                const clientX = ev.touches ? ev.touches[0].clientX : ev.clientX;
                const clientY = ev.touches ? ev.touches[0].clientY : ev.clientY;
                let x = Math.max(0, Math.min(92, ((clientX - rect.left) / rect.width) * 100 - 5));
                let y = Math.max(0, Math.min(85, ((clientY - rect.top) / rect.height) * 100 - 5));
                db.ref('online_players/' + dragTarget).update({ posX: x, posY: y });
            };
            const endHandler = () => {
                window.removeEventListener('mousemove', moveHandler);
                window.removeEventListener('touchmove', moveHandler);
            };
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('touchmove', moveHandler, { passive: false });
            window.addEventListener('mouseup', endHandler);
            window.addEventListener('touchend', endHandler);
        }

        function resetEverything() {
            clearInterval(gameTimer);
            db.ref('game_state').set({ status: 'WAITING' });
            db.ref('online_players').once('value', s => {
                s.forEach(c => db.ref('online_players/' + c.key).update({ isReady: false, targetX: null, targetY: null, votedOrder: null }));
            });
        }

        function addSimulatedPlayer() {
            const id = 'sim_' + Date.now();
            db.ref('online_players/' + id).set({ name: '機器人', isReady: false, avatar: "🤖", posX: Math.random()*80, posY: 82 });
        }
        
        function simulateReady(id, ready) { db.ref('online_players/' + id + '/isReady').set(ready); }

        // 機器人 AI 每 2 秒掃描竹筍
        setInterval(() => {
            db.ref('/').once('value', s => {
                const data = s.val();
                if (!data || data.game_state.status !== 'PLAYING') return;
                const players = data.online_players;
                const bamboos = data.game_state.bamboos || {};
                const now = Date.now();
                
                Object.keys(players).forEach(pid => {
                    if (pid.startsWith('sim_') && players[pid].isReady && players[pid].targetX === null) {
                        const availableBamboo = Object.keys(bamboos).find(bid => !bamboos[bid].claimedBy && now >= bamboos[bid].appearAt);
                        if (availableBamboo) claimBamboo(availableBamboo, pid);
                    }
                });
            });
        }, 2000);

        function sendChat() {
            const i = document.getElementById('chatInput');
            if (i.value.trim()) { db.ref('chats').push({ name: currentUser.displayName, text: i.value }); i.value = ""; }
        }
        function kickPlayer(id) { if(confirm("確定踢除？")) db.ref('online_players/' + id).remove(); }

        init();
        setInterval(() => {
            db.ref('game_state/bamboos').once('value', s => renderBamboos(s.val() || {}));
        }, 500);
    </script>
</body>
</html>
