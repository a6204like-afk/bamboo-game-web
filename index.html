<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎋 拔竹筍：邏輯修復版</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; text-align: center; background-color: #f1f8e9; margin: 0; padding: 10px; min-height: 100vh; }
        #farmMap {
            width: 100%; height: 400px; background-color: #dcedc8; border: 4px solid #8bc34a;
            border-radius: 20px; position: relative; overflow: hidden; margin: 5px auto;
            background-image: radial-gradient(#aed581 10%, transparent 11%); background-size: 30px 30px;
            touch-action: none;
        }
        #bambooFieldBtn {
            width: 110px; height: 110px; background: #8d6e63; border: 4px solid #6d4c41;
            border-radius: 15px; position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 1; cursor: pointer;
            box-shadow: 0 4px 0 #4e342e; transition: 0.1s; outline: none; padding: 0;
        }
        #bambooFieldBtn:active:not(.grayscale) { transform: translate(-50%, -48%); box-shadow: 0 1px 0 #4e342e; }
        #bambooStatus { color: #fff; font-size: 14px; font-weight: bold; text-shadow: 1px 1px 2px #000; }

        .farmer { width: 80px; height: 120px; position: absolute; display: flex; flex-direction: column; align-items: center; z-index: 10; cursor: grab; user-select: none; }
        .farmer-img { font-size: 35px; line-height: 1; pointer-events: none; }
        .bubble {
            position: absolute; top: -35px; background: #fff; border: 2px solid #4caf50;
            padding: 2px 8px; border-radius: 12px; font-size: 13px; font-weight: 900;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2); white-space: nowrap; z-index: 15; pointer-events: none;
        }
        .farmer-name { font-size: 11px; background: rgba(255,255,255,0.9); padding: 1px 6px; border-radius: 5px; white-space: nowrap; margin-top: 4px; border: 1px solid #ddd; pointer-events: none; }
        .host-label { border-color: #2196f3; background: #e3f2fd !important; color: #1976d2; font-weight: bold; }
        .admin-label { border-color: #f44336; background: #ffebee !important; color: #d32f2f; font-weight: bold; }
        
        .card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; margin: 0 auto 20px auto; }
        .grayscale { filter: grayscale(1); opacity: 0.4; pointer-events: none !important; }
        .btn-ui { padding: 10px 20px; border-radius: 20px; border: none; font-weight: bold; cursor: pointer; margin: 5px; transition: 0.2s; }
        .btn-ready { background: #ff9800; color: white; }
        .btn-cancel { background: #f44336; color: white; }
        .btn-start { background: #2196f3; color: white; }
        .btn-move { background: #9c27b0; color: white; }
        .btn-again { background: #4caf50; color: white; font-size: 18px; box-shadow: 0 4px 0 #2e7d32; width: 80%; }
        
        #chatBox { height: 100px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; text-align: left; padding: 8px; font-size: 12px; background: #fafafa; margin: 10px 0; }
        .sim-ctrl-box { display: flex; gap: 2px; margin-top: 4px; pointer-events: auto; }
        .sim-btn { padding: 2px 4px; font-size: 10px; cursor: pointer; background: #fff; border: 1px solid #bbb; border-radius: 4px; }
        
        /* 解決踢人按鈕點擊衝突 */
        .kick-btn { color: red; margin-left: 5px; cursor: pointer; font-weight: bold; position: relative; z-index: 25; pointer-events: auto !important; }
    </style>
</head>
<body>

    <div id="loginCard" class="card">
        <h2 id="welcomeName">🧑‍🌾 拔筍農場</h2> 
        <div id="loginActions">
            <button id="lineLoginBtn" class="btn-ui btn-start" onclick="liff.login()">登入 LINE</button>
            <br><br>
            <button id="enterGameBtn" class="btn-ui btn-start grayscale" onclick="enterGame()">進入田地</button>
        </div>
    </div>

    <div id="gameArea" class="card" style="display:none;">
        <div id="farmMap">
            <button id="bambooFieldBtn" class="grayscale" onclick="pressBamboo()">
                <div style="font-size: 40px;">🎋</div>
                <div id="bambooStatus"><span id="bambooCount">0</span> 隻竹筍</div>
            </button>
            <div id="playersLayer"></div>
        </div>

        <div id="gameStatusLabel" style="font-weight: bold; color: #4caf50; margin: 5px 0; font-size: 14px;">等待玩家準備...</div>

        <div id="controlPanel">
            <button id="readyBtn" class="btn-ui btn-ready" onclick="toggleReady()">準備好了</button>
            <button id="moveModeBtn" class="btn-ui btn-move" onclick="toggleMoveMode()">移動農夫：關</button>
            <button id="hostStartBtn" class="btn-ui btn-start" style="display:none;" onclick="hostStartGame()">開拔</button>
            <button id="againBtn" class="btn-ui btn-again" style="display:none;" onclick="resetEverything()">再來一局！</button>
        </div>

        <div id="chatBox"></div>
        <div style="display: flex; margin-bottom: 5px;">
            <input type="text" id="chatInput" placeholder="輸入聊天..." style="flex:1; padding: 10px; border-radius: 20px; border: 1px solid #ccc;" onkeypress="if(event.keyCode==13) sendChat()">
            <button onclick="sendChat()" style="background:#4caf50; color:white; border:none; border-radius:20px; padding:0 15px; margin-left:5px; font-weight:bold;">送出</button>
        </div>

        <div id="adminPanel" style="display:none; border-top: 1px dashed #ccc; padding-top: 10px; margin-top: 10px;">
            <div style="font-size: 11px; color: #f44336; font-weight: bold; margin-bottom: 5px;">👑 管理員後台</div>
            <button class="btn-ui" style="font-size:10px; background:#e1f5fe;" onclick="addSimulatedPlayer()">➕ 增加模擬</button>
            <button class="btn-ui" style="font-size:10px; background:#fff3e0;" onclick="clearChats()">🧹 清空聊天</button>
            <button class="btn-ui" style="font-size:10px; background:#ffebee;" onclick="resetEverything()">🔄 重置遊戲</button>
        </div>
    </div>

    <script>
        const ADMIN_UID = "U92fe108dea907bd4f4cc28d6da14318a";
        const firebaseConfig = {
            apiKey: "AIzaSyBHWJPT6ZyvFrZE0-d6gJW-F7EfJCQfeNE",
            authDomain: "bamboo-game.firebaseapp.com",
            databaseURL: "https://bamboo-game-default-rtdb.firebaseio.com/",
            projectId: "bamboo-game",
            storageBucket: "bamboo-game.firebasestorage.app",
            messagingSenderId: "986027038887",
            appId: "1:986027038887:web:d69613c79921b12f1a6382",
            measurementId: "G-R7TYX0Q3XR"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let currentUser = null;
        let inGame = false;
        let myReadyState = false;
        let isMoveMode = false;
        let dragTarget = null;
        const myAvatar = ["👨‍🌾", "👩‍🌾", "🧑‍🌾", "👴", "👵"][Math.floor(Math.random()*5)];

        async function init() {
            await liff.init({ liffId: "2009477552-iCxgtKls" });
            if (liff.isLoggedIn()) {
                document.getElementById('lineLoginBtn').style.display = "none";
                document.getElementById('enterGameBtn').classList.remove('grayscale');
                currentUser = await liff.getProfile();
                document.getElementById('welcomeName').innerText = "你好，" + currentUser.displayName;
                startGlobalSync();
            }
        }

        function startGlobalSync() {
            db.ref('/').on('value', (rootSnap) => {
                const data = rootSnap.val();
                if (!data) return;
                const players = data.online_players || {};
                const gameState = data.game_state || { status: 'WAITING' };
                const keys = Object.keys(players);
                
                if (inGame && !players[currentUser.userId]) {
                    alert("你已被踢出農場或與伺服器斷開連接！");
                    location.reload();
                    return;
                }

                const hostId = keys[0];
                const isAdminUser = (currentUser.userId === ADMIN_UID);
                myReadyState = players[currentUser.userId]?.isReady || false;

                renderPlayers(players, hostId, gameState, isAdminUser);
                updateGameStatus(gameState, hostId === currentUser.userId, isAdminUser);
            });

            db.ref('chats').limitToLast(10).on('value', s => {
                const box = document.getElementById('chatBox'); box.innerHTML = "";
                s.forEach(c => { const m = c.val(); box.innerHTML += `<div><b>${m.name}:</b> ${m.text}</div>`; });
                box.scrollTop = box.scrollHeight;
            });
        }

        function renderPlayers(players, hostId, gameState, isAdminUser) {
            const layer = document.getElementById('playersLayer');
            const keys = Object.keys(players);
            const readyPlayers = keys.filter(k => players[k].isReady);
            const notReadyPlayers = keys.filter(k => !players[k].isReady); // 找出沒準備的人
            const isPlaying = gameState.status !== 'WAITING';

            keys.forEach((id) => {
                let farmer = document.getElementById('farmer_' + id);
                const p = players[id];
                if (!p) return;

                if (!farmer) {
                    farmer = document.createElement('div');
                    farmer.id = 'farmer_' + id;
                    farmer.className = 'farmer';
                    farmer.addEventListener('mousedown', (e) => startDrag(e, id));
                    farmer.addEventListener('touchstart', (e) => startDrag(e, id), { passive: false });
                    layer.appendChild(farmer);
                }

                // --- 位置邏輯修正 ---
                if (isPlaying) {
                    if (p.isReady) {
                        // 1. 準備好的人：繞圈
                        const rIdx = readyPlayers.indexOf(id);
                        const angle = (rIdx / readyPlayers.length) * 2 * Math.PI;
                        farmer.style.left = (50 + 32 * Math.cos(angle)) + "%";
                        farmer.style.top = (50 + 28 * Math.sin(angle)) + "%";
                        farmer.style.transform = "translate(-50%, -50%)";
                        farmer.classList.remove('grayscale');
                        farmer.style.zIndex = "5";
                    } else {
                        // 2. 沒準備的人：遊戲開始時掃到左邊排隊
                        const nrIdx = notReadyPlayers.indexOf(id);
                        farmer.style.left = "5%"; // 固定在左邊 5% 的位置
                        farmer.style.top = (10 + nrIdx * 15) + "%"; // 垂直依序排列
                        farmer.style.transform = "none";
                        farmer.classList.add('grayscale'); // 變灰階
                        farmer.style.zIndex = "1";
                    }
                } else {
                    // 3. 等待中（非遊戲狀態）：顯示原本同步的拖拽座標
                    farmer.style.left = (p.posX || 0) + "%";
                    farmer.style.top = (p.posY || 0) + "%";
                    farmer.style.transform = "none";
                    farmer.classList.remove('grayscale');
                    farmer.style.zIndex = "10";
                }

                // --- 氣泡與標籤邏輯 (保持不變) ---
                let bubbleHtml = "";
                let face = p.avatar || "🧑‍🌾";
                if (gameState.collided_players?.[id]) { bubbleHtml = `<div class="bubble">💀 貪心鬼</div>`; face = "😵"; }
                else if (gameState.status === 'ENDED' && gameState.lastPlayerId === id && gameState.isLoserLone) { bubbleHtml = `<div class="bubble">🏜️ 可可憐憐</div>`; face = "🥺"; }
                else if (gameState.voted_count_at_time?.[id]) { bubbleHtml = `<div class="bubble">😊 ${gameState.voted_count_at_time[id]}隻竹筍</div>`; }

                const isHost = (id === hostId);
                const isAdmin = (id === ADMIN_UID);
                const kickAction = (isAdminUser && id !== currentUser.userId) ? `<span class="kick-btn" onclick="event.stopPropagation(); kickPlayer('${id}')">✕</span>` : "";

                let nameClass = "farmer-name"; let roleIcon = "";
                if (isAdmin) { nameClass += " admin-label"; roleIcon = "👑 "; }
                else if (isHost) { nameClass += " host-label"; roleIcon = "🔵 "; }

                let simControls = "";
                if (isAdminUser && id.startsWith('sim_')) {
                    if (gameState.status === 'WAITING') {
                        simControls = `<div class="sim-ctrl-box"><button class="sim-btn" onclick="simulateReady('${id}', ${!p.isReady})">${p.isReady ? '撤' : '備'}</button></div>`;
                    } else if (gameState.status === 'PLAYING' && p.isReady && (!gameState.voted_players || !gameState.voted_players[id])) {
                        simControls = `<div class="sim-ctrl-box"><button class="sim-btn" onclick="simulatePress('${id}', '${p.name}')">拔！</button></div>`;
                    }
                }

                farmer.innerHTML = `${bubbleHtml}<div class="farmer-img">${face}</div><div class="${nameClass}">${roleIcon}${p.isReady ? '🔸' : ''}${p.name}${kickAction}</div>${simControls}`;
            });

            Array.from(layer.children).forEach(child => {
                const id = child.id.replace('farmer_', '');
                if (!players[id]) child.remove();
            });
        }

        function startDrag(e, id) {
            // 修正：如果點擊的是踢人按鈕，不啟動拖曳
            if (e.target.classList.contains('kick-btn')) return;
            if (!isMoveMode) return;
            const isAdmin = (currentUser.userId === ADMIN_UID);
            if (id !== currentUser.userId && !(isAdmin && id.startsWith('sim_'))) return;
            
            dragTarget = id;
            const moveHandler = (ev) => onDrag(ev);
            const endHandler = () => {
                dragTarget = null;
                window.removeEventListener('mousemove', moveHandler);
                window.removeEventListener('mouseup', endHandler);
                window.removeEventListener('touchmove', moveHandler);
                window.removeEventListener('touchend', endHandler);
            };
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('mouseup', endHandler);
            window.addEventListener('touchmove', moveHandler, { passive: false });
            window.addEventListener('touchend', endHandler);
        }

        function onDrag(e) {
            if (!dragTarget) return;
            e.preventDefault();
            const map = document.getElementById('farmMap');
            const rect = map.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let x = ((clientX - rect.left) / rect.width) * 100 - 5;
            let y = ((clientY - rect.top) / rect.height) * 100 - 10;
            x = Math.max(0, Math.min(90, x)); y = Math.max(0, Math.min(85, y));
            db.ref('online_players/' + dragTarget).update({ posX: x, posY: y });
        }

        function toggleMoveMode() {
            isMoveMode = !isMoveMode;
            const btn = document.getElementById('moveModeBtn');
            btn.innerText = "移動農夫：" + (isMoveMode ? "開" : "關");
            btn.style.background = isMoveMode ? "#4caf50" : "#9c27b0";
        }

        function updateGameStatus(state, imHost, imAdmin) {
            document.getElementById('bambooCount').innerText = state.count || 0;
            const centralBtn = document.getElementById('bambooFieldBtn');
            const readyBtn = document.getElementById('readyBtn');
            const hostStartBtn = document.getElementById('hostStartBtn');
            const againBtn = document.getElementById('againBtn');
            const statusLabel = document.getElementById('gameStatusLabel');
            
            readyBtn.innerText = myReadyState ? "準備取消" : "準備好了";
            readyBtn.className = "btn-ui " + (myReadyState ? "btn-cancel" : "btn-ready");

            if (state.status === 'WAITING') {
                readyBtn.classList.remove('grayscale');
                hostStartBtn.style.display = imHost ? "inline-block" : "none";
                againBtn.style.display = "none";
                centralBtn.classList.add('grayscale');
                statusLabel.innerText = "等待玩家準備...";
            } else if (state.status === 'ENDED') {
                readyBtn.classList.add('grayscale');
                centralBtn.classList.add('grayscale');
                againBtn.style.display = (imHost || imAdmin) ? "inline-block" : "none";
                statusLabel.innerText = "本輪結束";
            } else {
                readyBtn.classList.add('grayscale');
                hostStartBtn.style.display = "none";
                const isPlaying = state.status === 'PLAYING';
                const alreadyVoted = state.voted_players?.[currentUser.userId];
                centralBtn.className = (isPlaying && myReadyState && !alreadyVoted) ? '' : 'grayscale';
                statusLabel.innerText = isPlaying ? (alreadyVoted ? "已拔取，等結果" : "快點擊中間竹筍！") : "倒數中...";
            }
            document.getElementById('adminPanel').style.display = imAdmin ? "block" : "none";
        }

        function enterGame() {
            inGame = true;
            document.getElementById('loginCard').style.display = "none";
            document.getElementById('gameArea').style.display = "block";
            db.ref('online_players/' + currentUser.userId).set({ 
                name: currentUser.displayName, isReady: false, avatar: myAvatar, posX: Math.random()*80, posY: Math.random()*80 
            });
            db.ref('online_players/' + currentUser.userId).onDisconnect().remove();
        }

        function toggleReady() {
            if (document.getElementById('readyBtn').classList.contains('grayscale')) return;
            db.ref('online_players/' + currentUser.userId + '/isReady').set(!myReadyState);
        }

        function hostStartGame() {
            db.ref('online_players').once('value', (snap) => {
                const players = snap.val() || {};
                const readyCount = Object.keys(players).filter(k => players[k].isReady).length;
                if (readyCount < 2) { alert("至少需 2 人準備！"); return; }
                db.ref('game_state').set({ status: 'STARTING', count: 0, readyCount: readyCount });
                setTimeout(() => {
                    db.ref('game_state').set({ 
                        status: 'PLAYING', 
                        count: 0, 
                        lastTime: 0, 
                        voted_players: {}, 
                        voted_count_at_time: {}, 
                        collided_players: {},
                        readyCount: readyCount 
                    });
                }, 1500 + Math.random() * 2000);
            });
        }

        // --- 核心邏輯修復：拔竹筍判定 ---
        function pressBamboo(uidInput, nameInput) {
            const uid = uidInput || currentUser.userId;
            const now = Date.now();
            
            // 先獲取當前準備的人數列表
            db.ref('online_players').once('value', (pSnap) => {
                const players = pSnap.val() || {};
                const readyIds = Object.keys(players).filter(k => players[k].isReady);
                const totalReady = readyIds.length;

                db.ref('game_state').transaction((curr) => {
                    if (!curr || curr.status !== 'PLAYING' || curr.voted_players?.[uid]) return;
                    
                    if (!curr.voted_players) curr.voted_players = {};
                    if (!curr.voted_count_at_time) curr.voted_count_at_time = {};
                    if (!curr.collided_players) curr.collided_players = {};

                    // 1. 碰撞判定 (800ms 內連續按下)
                    if (curr.lastTime && (now - curr.lastTime < 400)) {
                        curr.status = 'ENDED';
                        curr.collided_players[curr.lastPlayerId] = true;
                        curr.collided_players[uid] = true;
                    }

                    // 2. 正常拔取計數
                    curr.count = (curr.count || 0) + 1;
                    curr.lastTime = now;
                    curr.lastPlayerId = uid;
                    curr.voted_players[uid] = true;
                    curr.voted_count_at_time[uid] = curr.count;

                    // 3. 核心修正：判定是否剩最後一個人 (倒數第二個人按完)
                    const votedCount = Object.keys(curr.voted_players).length;
                    
                    // 如果（已拔人數）等於（總準備人數 - 1），且目前還沒因為碰撞結束
                    if (curr.status !== 'ENDED' && votedCount === totalReady - 1 && totalReady > 1) {
                        const loserId = readyIds.find(id => !curr.voted_players[id]);
                        if (loserId) {
                            curr.status = 'ENDED';
                            curr.lastPlayerId = loserId;
                            curr.isLoserLone = true; // 觸發「可可憐憐」氣泡
                        }
                    }
                    return curr;
                });
            });
        }

        function resetEverything() {
            db.ref('game_state').set({ status: 'WAITING', count: 0 });
            db.ref('online_players').once('value', s => {
                const updates = {};
                s.forEach(c => { updates[`online_players/${c.key}/isReady`] = false; });
                db.ref().update(updates);
            });
        }

        function sendChat() {
            const i = document.getElementById('chatInput');
            if (i.value.trim() && currentUser) { db.ref('chats').push({ name: currentUser.displayName, text: i.value }); i.value = ""; }
        }
        function clearChats() { if(confirm("確定清空聊天？")) db.ref('chats').remove(); }
        function addSimulatedPlayer() {
            const id = 'sim_' + Date.now();
            db.ref('online_players/' + id).set({ name: '測試農夫' + Math.floor(Math.random()*100), isReady: false, avatar: "🤖", posX: Math.random()*80, posY: Math.random()*80 });
        }
        function simulateReady(uid, s) { db.ref('online_players/' + uid + '/isReady').set(s); }
        function simulatePress(uid, name) { pressBamboo(uid, name); }
        function kickPlayer(id) { if(confirm("確定踢除？")) db.ref('online_players/' + id).remove(); }
        init();
    </script>
</body>
</html>
